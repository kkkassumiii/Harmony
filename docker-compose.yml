version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: harmony-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-harmony_db}
      POSTGRES_USER: ${DB_USER:-harmony_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-harmony_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-harmony_user} -d ${DB_NAME:-harmony_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - harmony_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: harmony-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 8000
      DATABASE_URL: postgresql://${DB_USER:-harmony_user}:${DB_PASSWORD:-harmony_password}@postgres:5432/${DB_NAME:-harmony_db}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - harmony_network

  # Frontend App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: harmony-frontend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000/api}
      REACT_APP_APP_NAME: "Гармония с собой"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start
    networks:
      - harmony_network

volumes:
  postgres_data:
    driver: local

networks:
  harmony_network:
    driver: bridge
